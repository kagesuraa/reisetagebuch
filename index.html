<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Reisetagebuch</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <style>
    #map { height: 100dvh; width: 100%; }

    #sidebar {
      transition: transform 0.35s cubic-bezier(.4,0,.2,1);
      transform: translateX(100%);
    }
    #sidebar.open { transform: translateX(0); }

    /* Leaflet-Zoom nach rechts unten verschieben */
    .leaflet-bottom.leaflet-right { bottom: 24px; right: 16px; }

    .leaflet-popup-content { margin: 12px 16px; }

    .scroll-thin::-webkit-scrollbar { width: 4px; }
    .scroll-thin::-webkit-scrollbar-track { background: transparent; }
    .scroll-thin::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; }

    /* Lightbox */
    #lightbox { transition: opacity .25s ease; }
    #lightbox-card { transition: opacity .25s ease, transform .25s ease; }
    #lightbox.open { opacity: 1 !important; pointer-events: auto !important; }
    #lightbox.open #lightbox-card { opacity: 1 !important; transform: scale(1) !important; }

    /* Animierte Reiseroute */
    @keyframes route-dash { to { stroke-dashoffset: -22; } }
    .route-animated { animation: route-dash 1.4s linear infinite; }

    /* Vorschau-Pin Ripple */
    @keyframes ripple {
      0%   { transform: scale(1);   opacity: 0.55; }
      100% { transform: scale(3.2); opacity: 0; }
    }
    .preview-ring {
      animation: ripple 1.4s ease-out infinite;
    }
  </style>
</head>

<body class="overflow-hidden bg-gray-100">

  <div id="map"></div>

  <!-- Statistik + Filter (oben links, gestapelt) -->
  <div class="fixed top-4 left-4 z-[1000] flex flex-col gap-2 max-w-xs">

                flex items-center gap-4 pointer-events-none">
      <div class="text-center">
        <p id="stat-count" class="text-2xl font-bold text-orange-500 leading-none">0</p>
        <p class="text-xs text-gray-400 font-medium mt-0.5">Besuchte Orte</p>
      </div>
      <div class="w-px h-8 bg-gray-200"></div>
      <div class="text-center">
        <p id="stat-photos" class="text-2xl font-bold text-amber-500 leading-none">0</p>
        <p class="text-xs text-gray-400 font-medium mt-0.5">mit Foto</p>

    </div>

          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-4.35-4.35M17 11A6 6 0 1 1 5 11a6 6 0 0 1 12 0z"/>
        </svg>
        <input id="filter-text" type="text" placeholder="Orte filtern …" autocomplete="off"

      </div>
      <!-- Jahres-Dropdown -->

      <!-- Reset-Button -->
      <button id="filter-reset"

    </div>

  <!-- Toast -->
  <div id="toast-container"

  <!-- Ortssuche -->

      <!-- Ergebnisse-Dropdown -->

  <!-- Seitenleiste -->

    <div class="bg-gradient-to-br from-orange-500 to-amber-400 text-white px-6 py-5 flex-shrink-0">
      <div class="flex items-center justify-between mb-1">
        <div class="flex items-center gap-2">

            <path d="M13.5 0C13.5 0 14 4.5 11.5 7C9 9.5 6 9 6 9C6 9 7 13 10 14.5C10 14.5 9 16 7.5 16C7.5 16 9 19.5 13 20C17 20.5 20 17 20 13C20 9 17 7 17 7C17 7 16.5 9.5 14.5 10C14.5 10 15.5 7.5 13.5 0Z"/>
          </svg>

  <script>
  // ══════════════════════════════════════════════════════════════════════════
  //  Supabase-Konfiguration
  // ══════════════════════════════════════════════════════════════════════════
  const SUPABASE_URL = 'https://zjykhnebeyqmonhgvlja.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpqeWtobmViZXlxbW9uaGd2bGphIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk0NzQ2NDEsImV4cCI6MjA5NTA1MDY0MX0.Ou7bbpYeiHz7G9s4iJEBW9syAapw23EsgMcYd14iw1k';
  const TABLE        = 'reise_eintraege';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  // ══════════════════════════════════════════════════════════════════════════

  let entries      = [];
  let pendingLat   = null;
  let pendingLng   = null;
  let pendingPhoto = null;
  let previewMarker = null;
  const markerMap  = {};

  function showPreviewPin(lat, lng) {
    if (previewMarker) { map.removeLayer(previewMarker); previewMarker = null; }
    const icon = L.divIcon({
      className: '',
      html: `
        <div style="position:relative;width:20px;height:20px">
          <div class="preview-ring" style="
            position:absolute;inset:0;background:#6366f1;border-radius:50%;
          "></div>
          <div style="
            position:absolute;inset:3px;background:#6366f1;
            border:2.5px solid white;border-radius:50%;
            box-shadow:0 2px 10px rgba(99,102,241,.55);
          "></div>
        </div>`,
      iconSize:    [20, 20],
      iconAnchor:  [10, 10],
      popupAnchor: [0, -14],
    });
    previewMarker = L.marker([lat, lng], { icon, interactive: false, zIndexOffset: 500 }).addTo(map);
  }

  function removePreviewPin() {
    if (previewMarker) { map.removeLayer(previewMarker); previewMarker = null; }
  }

  // ─── Reiseroute ───────────────────────────────────────────────────────────
  let routeLayer = null;
  let showRoute  = true;

  function drawRoute() {
    if (routeLayer) { map.removeLayer(routeLayer); routeLayer = null; }
    if (!showRoute || entries.length < 2) return;

    // Chronologisch nach Datum sortieren; Einträge ohne Datum ans Ende
    const sorted = [...entries].sort((a, b) => {
      if (a.date && b.date) return a.date.localeCompare(b.date);
      if (a.date)  return -1;
      if (b.date)  return  1;
      return 0;
    });

    const coords = sorted.map(e => [e.lat, e.lng]);

    // Leuchtender Glüh-Effekt: dicke halbtransparente Basis + animierte Strich-Linie
    const glow = L.polyline(coords, {
      color:     '#fb923c',
      weight:    8,
      opacity:   0.18,
      lineCap:   'round',
      lineJoin:  'round',
    });

    const line = L.polyline(coords, {
      color:     '#f97316',
      weight:    2.5,
      opacity:   0.9,
      dashArray: '10, 7',
      lineCap:   'round',
      lineJoin:  'round',
    });

    routeLayer = L.layerGroup([glow, line]).addTo(map);

    // CSS-Animation auf den SVG-Pfad der gepunkteten Linie anwenden
    line.on('add', () => {
      const el = line.getElement();
      if (el) el.classList.add('route-animated');
    });
    // Falls bereits geaddet (LayerGroup)
    setTimeout(() => {
      const el = line.getElement();
      if (el) el.classList.add('route-animated');
    }, 50);
  }

  function toggleRoute() {
    showRoute = !showRoute;
    const sw    = document.getElementById('route-switch');
    const thumb = document.getElementById('route-thumb');
    if (showRoute) {
      sw.classList.replace('bg-gray-300', 'bg-orange-500');
      thumb.classList.replace('left-0.5', 'right-0.5');
      thumb.classList.remove('left-0.5');
      thumb.classList.add('right-0.5');
    } else {
      sw.classList.replace('bg-orange-500', 'bg-gray-300');
      thumb.classList.remove('right-0.5');
      thumb.classList.add('left-0.5');
    }
    drawRoute();
  }

  // ─── Karte (einmalige Welt, keine Wiederholung) ───────────────────────────
  const worldBounds = L.latLngBounds(L.latLng(-85.051, -180), L.latLng(85.051, 180));

  const map = L.map('map', {
    zoomControl:          false,
    maxBounds:            worldBounds,
    maxBoundsViscosity:   1.0,
    minZoom:              1,
    worldCopyJump:        false,
  }).setView([20, 10], 3);

  L.control.zoom({ position: 'bottomright' }).addTo(map);

  L.tileLayer('https://tile.openstreetmap.de/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom:  18,
    noWrap:   true,
    bounds:   worldBounds,
  }).addTo(map);

  // ─── MinZoom dynamisch berechnen (kein grauer Rand beim Rauszoomen) ────────
  function updateMinZoom() {
    const w = map.getContainer().clientWidth;
    const h = map.getContainer().clientHeight;
    // Bei Zoom z ist die Weltkarte 256 * 2^z Pixel breit/hoch.
    // MinZoom so setzen, dass die Karte den Viewport immer ausfüllt.
    const minZ = Math.ceil(Math.log2(Math.max(w, h) / 256));
    map.setMinZoom(Math.max(1, minZ));
    // Wenn aktueller Zoom kleiner als neues Minimum, anpassen
    if (map.getZoom() < map.getMinZoom()) map.setZoom(map.getMinZoom());
  }

  updateMinZoom();
  window.addEventListener('resize', () => { map.invalidateSize(); updateMinZoom(); });

  // ─── Marker-Icon ──────────────────────────────────────────────────────────
  function makeIcon(hasPhoto) {
    const dot = hasPhoto
      ? `<div style="position:absolute;top:-5px;right:-5px;width:10px;height:10px;
                     background:#10b981;border:2px solid white;border-radius:50%"></div>`
      : '';
    return L.divIcon({
      className: '',
      html: `<div style="position:relative;width:18px;height:18px;background:#f97316;
                         border:3px solid white;border-radius:50%;
                         box-shadow:0 2px 8px rgba(249,115,22,.5)">${dot}</div>`,
      iconSize:    [18, 18],
      iconAnchor:  [9,  9],
      popupAnchor: [0, -14],
    });
  }

  // ─── Bild komprimieren ────────────────────────────────────────────────────
  function compressImage(file, maxSide = 900, quality = 0.78) {
    return new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = evt => {
        const img = new Image();
        img.onload = () => {
          const ratio  = Math.min(maxSide / img.width, maxSide / img.height, 1);
          const canvas = document.createElement('canvas');
          canvas.width  = Math.round(img.width  * ratio);
          canvas.height = Math.round(img.height * ratio);
          canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
          resolve(canvas.toDataURL('image/jpeg', quality));
        };
        img.src = evt.target.result;
      };
      reader.readAsDataURL(file);
    });
  }

  // ─── Supabase-Zeile → JS-Objekt ───────────────────────────────────────────
  function rowToEntry(row) {
    return {
      id:           row.id,
      lat:          row.lat,
      lng:          row.lng,
      locationName: row.location_name,
      date:         row.date || '',
      notes:        row.notes || '',
      photoUrl:     row.photo_url   || null,   // Supabase Storage URL
      photoBase64:  row.photo_base64 || null,  // Fallback für alte Einträge
    };
  }

  // Gibt die optimierte Bild-URL zurück (Storage-Transform oder Base64-Fallback)
  function getPhotoSrc(entry, width = 400) {
    if (entry.photoUrl)
      return `${entry.photoUrl}?width=${width}&resize=contain`;
    return entry.photoBase64 || null;
  }

  function hasPhoto(entry) { return !!(entry.photoUrl || entry.photoBase64); }

  // ─── Foto in Supabase Storage hochladen ───────────────────────────────────
  async function uploadPhoto(base64DataUrl) {
    const res      = await fetch(base64DataUrl);
    const blob     = await res.blob();
    const fileName = `${Date.now()}-${Math.random().toString(36).slice(2)}.jpg`;
    const { error } = await sb.storage.from('photos').upload(fileName, blob, {
      contentType: 'image/jpeg', upsert: false,
    });
    if (error) throw error;
    return sb.storage.from('photos').getPublicUrl(fileName).data.publicUrl;
  }

  // ─── Datum formatieren ────────────────────────────────────────────────────
  function fmtDate(iso) {
    if (!iso) return '–';
    const [y, m, d] = iso.split('-');
    return `${d}.${m}.${y}`;
  }

  // ─── XSS-Schutz ───────────────────────────────────────────────────────────
  function esc(str) {
    return String(str || '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ─── Toast ────────────────────────────────────────────────────────────────
  function toast(msg, type = 'ok') {
    const bg = { ok: 'bg-emerald-600', err: 'bg-red-600', info: 'bg-orange-500' }[type];
    const el = document.createElement('div');
    el.className = `${bg} text-white text-sm font-medium px-5 py-3 rounded-xl
                    shadow-lg opacity-0 transition-opacity duration-300 pointer-events-auto`;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    requestAnimationFrame(() => el.style.opacity = '1');
    setTimeout(() => { el.style.opacity = '0'; setTimeout(() => el.remove(), 320); }, 3200);
  }

  // ─── Statistik ────────────────────────────────────────────────────────────
  function updateStats() {
    document.getElementById('stat-count').textContent  = entries.length;
    document.getElementById('stat-photos').textContent = entries.filter(hasPhoto).length;
  }

  // ─── Marker setzen ────────────────────────────────────────────────────────
  function placeMarker(entry) {
    const marker = L.marker([entry.lat, entry.lng], { icon: makeIcon(hasPhoto(entry)) }).addTo(map);
    marker.on('click', () => openLightbox(entry));
    markerMap[entry.id] = marker;
  }

  // ─── Lightbox ─────────────────────────────────────────────────────────────
  const lightbox     = document.getElementById('lightbox');
  const lbCard       = document.getElementById('lightbox-card');
  const lbClose      = document.getElementById('lb-close');
  const lbDelete     = document.getElementById('lb-delete');
  const lbPhotoPanel = document.getElementById('lb-photo-panel');
  const lbImg        = document.getElementById('lb-img');
  const lbDate       = document.getElementById('lb-date');
  const lbName       = document.getElementById('lb-name');
  const lbNotes      = document.getElementById('lb-notes');
  const lbCoords     = document.getElementById('lb-coords');
  let   lbActiveId   = null;

  function openLightbox(entry) {
    lbActiveId = entry.id;

    // Foto
    const src = getPhotoSrc(entry, 900);
    if (src) {
      lbImg.src = src;
      lbPhotoPanel.classList.remove('hidden');
    } else {
      lbImg.src = '';
      lbPhotoPanel.classList.add('hidden');
      // Kein Foto: Inhalt nimmt volle Breite
      lbCard.classList.remove('sm:flex-row');
    }

    // Texte
    lbDate.textContent   = entry.date ? `📅  ${fmtDate(entry.date)}` : '';
    lbName.textContent   = entry.locationName;
    lbNotes.textContent  = entry.notes || 'Keine Notizen hinterlassen.';
    lbCoords.textContent = `${entry.lat.toFixed(4)}°, ${entry.lng.toFixed(4)}°`;

    // Einblenden
    lightbox.classList.add('open');
    document.addEventListener('keydown', onLbKey);
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    document.removeEventListener('keydown', onLbKey);
    lbCard.classList.add('sm:flex-row'); // Reset für nächsten Aufruf
    setTimeout(() => { lbImg.src = ''; }, 260);
  }

  function onLbKey(e) { if (e.key === 'Escape') closeLightbox(); }

  lbClose.addEventListener('click', closeLightbox);
  // Klick auf abgedunkelten Hintergrund schließt Modal
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  lbDelete.addEventListener('click', async () => {
    if (lbActiveId) { closeLightbox(); await deleteEntry(lbActiveId); }
  });

  // ─── Liste rendern ────────────────────────────────────────────────────────
  function renderList() {
    document.getElementById('list-loader').classList.add('hidden');
    const list  = document.getElementById('entries-list');
    const count = document.getElementById('entry-count');
    list.classList.remove('hidden');

    count.textContent = entries.length
      ? `${entries.length} ${entries.length === 1 ? 'Eintrag' : 'Einträge'}`
      : '';

    if (entries.length === 0) {
      list.innerHTML = '<p class="text-center text-gray-300 text-xs py-3">Noch keine Einträge gespeichert.</p>';
      updateStats();
      return;
    }

    list.innerHTML = entries.map(e => `
      <div class="flex items-center gap-2 rounded-lg px-3 py-2
                  bg-gray-50 hover:bg-orange-50 transition-colors group">
        ${hasPhoto(e)
          ? `<img src="${getPhotoSrc(e, 80)}" class="w-9 h-9 rounded-md object-cover flex-shrink-0" loading="lazy" />`
          : `<div class="w-9 h-9 rounded-md bg-orange-100 flex items-center justify-center flex-shrink-0 text-sm">📍</div>`
        }
        <div class="flex-1 min-w-0 cursor-pointer" onclick="flyTo('${e.id}')">
          <p class="text-sm font-medium text-gray-700 truncate">${esc(e.locationName)}</p>
          <p class="text-xs text-gray-400">${fmtDate(e.date)}</p>
        </div>
        <button onclick="deleteEntry('${e.id}')"
          class="text-gray-300 hover:text-red-500 transition-colors
                 opacity-0 group-hover:opacity-100 text-lg leading-none flex-shrink-0">×</button>
      </div>
    `).join('');

    updateStats();
    drawRoute();
  }

  // ─── Zur Position fliegen ─────────────────────────────────────────────────
  function flyTo(id) {
    const e = entries.find(e => e.id === id);
    if (!e) return;
    map.flyTo([e.lat, e.lng], 12, { duration: 1.4 });
    setTimeout(() => markerMap[id]?.openPopup(), 1500);
  }

  // ─── Löschen ──────────────────────────────────────────────────────────────
  async function deleteEntry(id) {
    if (!confirm('Diesen Eintrag wirklich löschen?')) return;
    const { error } = await sb.from(TABLE).delete().eq('id', id);
    if (error) { toast('Fehler beim Löschen: ' + error.message, 'err'); return; }
    entries = entries.filter(e => e.id !== id);
    if (markerMap[id]) { map.removeLayer(markerMap[id]); delete markerMap[id]; }
    map.closePopup();
    renderList();
    toast('Eintrag gelöscht.');
  }

  // ─── Foto-Upload ──────────────────────────────────────────────────────────
  const inpPhoto          = document.getElementById('inp-photo');
  const imgPreview        = document.getElementById('img-preview');
  const uploadPlaceholder = document.getElementById('upload-placeholder');
  const btnRemovePhoto    = document.getElementById('btn-remove-photo');
  const uploadArea        = document.getElementById('upload-area');

  async function applyPhoto(file) {
    if (!file || !file.type.startsWith('image/')) {
      toast('Bitte eine Bilddatei auswählen (JPG, PNG, WEBP).', 'err');
      return;
    }
    uploadPlaceholder.innerHTML =
      `<svg class="w-5 h-5 spin" fill="none" viewBox="0 0 24 24">
         <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
         <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
       </svg>
       <span class="text-xs">Komprimiere …</span>`;
    try {
      pendingPhoto = await compressImage(file);
    } catch {
      toast('Fehler beim Lesen des Bildes.', 'err');
      resetPhoto();
      return;
    }
    imgPreview.src = pendingPhoto;
    imgPreview.classList.remove('hidden');
    uploadPlaceholder.classList.add('hidden');
    btnRemovePhoto.classList.remove('hidden');
  }

  inpPhoto.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    await applyPhoto(file);
    inpPhoto.value = '';
  });

  btnRemovePhoto.addEventListener('click', ev => { ev.stopPropagation(); resetPhoto(); });

  function resetPhoto() {
    pendingPhoto = null;
    inpPhoto.value = '';
    imgPreview.src = '';
    imgPreview.classList.add('hidden');
    btnRemovePhoto.classList.add('hidden');
    uploadPlaceholder.classList.remove('hidden');
    uploadPlaceholder.innerHTML =
      `<svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
         <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
           d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828
              0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
       </svg>
       <span class="text-xs font-medium">Foto auswählen oder hierher ziehen</span>
       <span class="text-xs text-gray-300">JPG, PNG, WEBP – max. ~5 MB</span>`;
  }

  uploadArea.addEventListener('dragover', e => {
    e.preventDefault();
    uploadArea.classList.add('border-orange-400', 'bg-orange-50');
  });
  uploadArea.addEventListener('dragleave', e => {
    if (!uploadArea.contains(e.relatedTarget))
      uploadArea.classList.remove('border-orange-400', 'bg-orange-50');
  });
  uploadArea.addEventListener('drop', async e => {
    e.preventDefault();
    uploadArea.classList.remove('border-orange-400', 'bg-orange-50');
    await applyPhoto(e.dataTransfer.files[0]);
  });

  // ─── Seitenleiste ─────────────────────────────────────────────────────────
  const sidebar = document.getElementById('sidebar');
  function openSidebar()  { sidebar.classList.add('open'); }
  function closeSidebar() {
    sidebar.classList.remove('open');
    pendingLat = pendingLng = null;
    resetPhoto();
    removePreviewPin();
  }

  document.getElementById('btn-close').addEventListener('click', closeSidebar);

  map.on('click', e => {
    pendingLat = e.latlng.lat;
    pendingLng = e.latlng.lng;
    showPreviewPin(pendingLat, pendingLng);
    document.getElementById('coords-display').textContent =
      `${pendingLat.toFixed(5)}°, ${pendingLng.toFixed(5)}°`;
    document.getElementById('inp-location').value = '';
    document.getElementById('inp-notes').value    = '';
    document.getElementById('inp-date').value     = new Date().toISOString().slice(0, 10);
    resetPhoto();
    openSidebar();
    setTimeout(() => document.getElementById('inp-location').focus(), 360);
  });

  // ─── Speichern ────────────────────────────────────────────────────────────
  const btnSave     = document.getElementById('btn-save');
  const saveLabel   = document.getElementById('save-label');
  const saveSpinner = document.getElementById('save-spinner');

  function setSaving(on) {
    btnSave.disabled = on;
    saveLabel.textContent = on ? 'Wird gespeichert …' : '✈  Eintrag speichern';
    saveSpinner.classList.toggle('hidden', !on);
  }

  btnSave.addEventListener('click', async () => {
    if (pendingLat === null) return;
    setSaving(true);

    // Foto: in Storage hochladen, URL speichern (kein Base64 mehr in DB)
    let photoUrl = null;
    if (pendingPhoto) {
      try {
        photoUrl = await uploadPhoto(pendingPhoto);
      } catch (e) {
        toast('Foto-Upload fehlgeschlagen: ' + e.message, 'err');
        setSaving(false);
        return;
      }
    }

    const payload = {
      lat:           pendingLat,
      lng:           pendingLng,
      location_name: document.getElementById('inp-location').value.trim() || 'Unbekannter Ort',
      date:          document.getElementById('inp-date').value || null,
      notes:         document.getElementById('inp-notes').value.trim() || null,
      photo_url:     photoUrl,
      photo_base64:  null,
    };

    const { data, error } = await sb.from(TABLE).insert([payload]).select().single();

    if (error) {
      toast('Fehler beim Speichern: ' + error.message, 'err');
      setSaving(false);
      return;
    }

    const entry = rowToEntry(data);
    entries.push(entry);
    placeMarker(entry);
    renderList();
    closeSidebar();
    toast(`"${entry.locationName}" gespeichert ✓`);
    setSaving(false);
  });

  // ─── Start: Einträge laden ────────────────────────────────────────────────
  // ─── Ortssuche (Nominatim) ────────────────────────────────────────────────
  const searchInput   = document.getElementById('search-input');
  const searchResults = document.getElementById('search-results');
  const searchClear   = document.getElementById('search-clear');
  let searchTimer     = null;

  searchInput.addEventListener('input', () => {
    const q = searchInput.value.trim();
    searchClear.classList.toggle('hidden', !q);
    clearTimeout(searchTimer);
    if (q.length < 2) { hideResults(); return; }
    searchTimer = setTimeout(() => fetchPlaces(q), 380);
  });

  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Escape') clearSearch();
  });

  searchClear.addEventListener('click', clearSearch);

  // Dropdown schließen bei Klick außerhalb
  document.addEventListener('click', e => {
    if (!e.target.closest('#search-input') && !e.target.closest('#search-results'))
      hideResults();
  });

  async function fetchPlaces(q) {
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&addressdetails=1`;
      const res  = await fetch(url, { headers: { 'Accept-Language': 'de' } });
      const data = await res.json();
      showResults(data);
    } catch {
      hideResults();
    }
  }

  function showResults(places) {
    if (!places.length) {
      searchResults.innerHTML =
        `<li class="px-4 py-3 text-sm text-gray-400 text-center">Kein Ergebnis gefunden</li>`;
      searchResults.classList.remove('hidden');
      return;
    }

    searchResults.innerHTML = places.map((p, i) => {
      const name    = p.display_name.split(',')[0];
      const sub     = p.display_name.split(',').slice(1, 3).join(',').trim();
      return `
        <li data-i="${i}" data-lat="${p.lat}" data-lng="${p.lon}" data-name="${esc(p.display_name)}"
          class="flex items-center gap-3 px-4 py-3 cursor-pointer hover:bg-orange-50
                 transition-colors border-b border-gray-50 last:border-0">
          <svg class="w-4 h-4 text-orange-400 flex-shrink-0" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0
                     9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
          </svg>
          <div class="min-w-0">
            <p class="text-sm font-medium text-gray-800 truncate">${esc(name)}</p>
            <p class="text-xs text-gray-400 truncate">${esc(sub)}</p>
          </div>
        </li>`;
    }).join('');

    searchResults.classList.remove('hidden');

    // Klick auf Ergebnis
    searchResults.querySelectorAll('li[data-lat]').forEach(li => {
      li.addEventListener('click', () => {
        const lat  = parseFloat(li.dataset.lat);
        const lng  = parseFloat(li.dataset.lng);
        const name = li.dataset.name.split(',')[0];

        // Karte dorthin fliegen
        map.flyTo([lat, lng], 13, { duration: 1.2 });

        // Koordinaten & Ortsname direkt in den neuen Eintrag übernehmen
        pendingLat = lat;
        pendingLng = lng;
        showPreviewPin(lat, lng);
        document.getElementById('coords-display').textContent =
          `${lat.toFixed(5)}°, ${lng.toFixed(5)}°`;
        document.getElementById('inp-location').value = name;
        document.getElementById('inp-notes').value    = '';
        document.getElementById('inp-date').value     = new Date().toISOString().slice(0, 10);
        resetPhoto();
        openSidebar();

        clearSearch();
        setTimeout(() => document.getElementById('inp-notes').focus(), 400);
      });
    });
  }

  function hideResults() { searchResults.classList.add('hidden'); }

  function clearSearch() {
    searchInput.value = '';
    searchClear.classList.add('hidden');
    hideResults();
  }

  // ─── Filter ───────────────────────────────────────────────────────────────
  let filterTimer = null;

  const filterTextEl  = document.getElementById('filter-text');
  const filterYearEl  = document.getElementById('filter-year');
  const filterResetEl = document.getElementById('filter-reset');

  function isFilterActive() {
    return filterTextEl.value.trim() !== '' || filterYearEl.value !== '';
  }

  async function applyFilters() {
    filterResetEl.classList.toggle('hidden', !isFilterActive());

    let q = sb.from(TABLE).select('*').order('created_at', { ascending: true });
    const txt  = filterTextEl.value.trim();
    const year = filterYearEl.value;
    if (txt)  q = q.ilike('location_name', `%${txt}%`);
    if (year) q = q.like('date', `${year}-%`);

    const { data, error } = await q;
    if (error) { toast('Filterfehler: ' + error.message, 'err'); return; }

    // Alle Marker entfernen und neu zeichnen
    Object.keys(markerMap).forEach(id => { map.removeLayer(markerMap[id]); delete markerMap[id]; });
    entries = data.map(rowToEntry);
    entries.forEach(placeMarker);
    renderList();
  }

  filterTextEl.addEventListener('input', () => {
    clearTimeout(filterTimer);
    filterTimer = setTimeout(applyFilters, 350);
  });

  filterYearEl.addEventListener('change', applyFilters);

  filterResetEl.addEventListener('click', () => {
    filterTextEl.value = '';
    filterYearEl.value = '';
    applyFilters();
  });

  function populateYearFilter(rows) {
    const years = [...new Set(
      rows.map(r => r.date?.slice(0, 4)).filter(Boolean)
    )].sort((a, b) => b - a);

    const sel = filterYearEl;
    // Vorhandene dynamische Optionen entfernen
    [...sel.options].forEach(o => { if (o.value) o.remove(); });
    years.forEach(y => {
      const o = document.createElement('option');
      o.value = y; o.textContent = y;
      sel.appendChild(o);
    });
  }

  // ─── Start: Einträge laden ────────────────────────────────────────────────
  async function init() {
    const { data, error } = await sb
      .from(TABLE)
      .select('*')
      .order('created_at', { ascending: true });

    if (error) {
      toast('Supabase-Fehler: ' + error.message, 'err');
      const loader = document.getElementById('list-loader');
      loader.textContent = '⚠ Verbindungsfehler – RLS-Regeln prüfen';
      return;
    }

    populateYearFilter(data);
    entries = data.map(rowToEntry);
    entries.forEach(placeMarker);
    renderList();
    if (entries.length) toast(`${entries.length} Einträge geladen`, 'info');
  }

  init();
  </script>
</body>
</html>
